<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Omok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>OMOK</h1>
            <p class="subtitle">오목 - The Five in a Row</p>
        </header>

        <main>
            <div class="game-info">
                <div class="player black active" id="player-black">
                    <div class="stone-preview black-stone"></div>
                    <span class="player-name">흑돌 (Black)</span>
                </div>
                <div class="status-center">
                    <div class="status-message" id="status-message">흑의 차례입니다</div>
                    <div class="timer-display" id="timer-display">30</div>
                </div>
                <div class="player white" id="player-white">
                    <div class="stone-preview white-stone"></div>
                    <span class="player-name">백돌 (White)</span>
                </div>
            </div>

            <div class="board-container">
                <div id="board" class="board">
                    <!-- Board grid and stones will be generated here -->
                </div>
            </div>

            <div class="controls">
                <button id="reset-btn" class="btn primary">게임 재시작</button>
                <button class="btn secondary" onclick="document.getElementById('ad-overlay').classList.remove('hidden')">광고 문의</button>
            </div>
        </main>

        <footer>
            <p>광고 게재 문의는 <button class="footer-link" onclick="document.getElementById('ad-overlay').classList.remove('hidden')">여기</button>를 클릭하세요.</p>
        </footer>
    </div>

    <!-- 오버레이들은 body 직계 자식으로 배치 (stacking context 간섭 방지) -->

    <!-- Mode Selection -->
    <div id="mode-overlay">
        <div id="mode-card">
            <h2 class="mode-title">OMOK</h2>
            <p class="mode-subtitle">게임 모드를 선택하세요</p>
            <div class="mode-buttons">
                <button class="mode-btn" onclick="window.omokGame.startGame('pvp')">
                    <span class="mode-icon">👤👤</span>
                    <span class="mode-label">1:1 하기</span>
                    <span class="mode-desc">친구와 대결</span>
                </button>
                <button class="mode-btn" onclick="window.omokGame.startGame('ai')">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-label">혼자하기</span>
                    <span class="mode-desc">AI와 대결</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Win Overlay -->
    <div id="win-overlay" class="overlay hidden">
        <div class="modal">
            <h2 id="win-title">승리!</h2>
            <p id="win-desc">흑돌이 승리했습니다.</p>
            <button id="modal-reset-btn" class="btn primary large">다시 하기</button>
        </div>
    </div>

    <!-- Ad Inquiry Overlay -->
    <div id="ad-overlay" class="overlay hidden">
        <div class="modal ad-modal">
            <button class="modal-close" onclick="document.getElementById('ad-overlay').classList.add('hidden')">&times;</button>
            <h2 class="ad-modal-title">광고 문의</h2>
            <p class="ad-modal-desc">아래 양식을 작성하시면 빠르게 연락드리겠습니다.</p>
            <form id="ad-form" action="https://formspree.io/f/mgonplql" method="POST">
                <div class="form-group">
                    <label for="ad-name">이름 / 회사명</label>
                    <input type="text" id="ad-name" name="name" placeholder="홍길동 / (주)회사명" required>
                </div>
                <div class="form-group">
                    <label for="ad-email">이메일</label>
                    <input type="email" id="ad-email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="ad-budget">광고 예산 (선택)</label>
                    <select id="ad-budget" name="budget">
                        <option value="">선택 안 함</option>
                        <option value="under-10">10만원 미만</option>
                        <option value="10-50">10만원 ~ 50만원</option>
                        <option value="50-100">50만원 ~ 100만원</option>
                        <option value="over-100">100만원 이상</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ad-message">문의 내용</label>
                    <textarea id="ad-message" name="message" rows="4" placeholder="광고 형태, 기간, 기타 요청 사항을 자유롭게 작성해 주세요." required></textarea>
                </div>
                <button type="submit" class="btn primary btn-full">문의 보내기</button>
            </form>
            <p id="ad-success" class="ad-success hidden">문의가 성공적으로 전송되었습니다! 빠른 시일 내에 연락드리겠습니다.</p>
        </div>
    </div>

    <script>
        const adForm = document.getElementById('ad-form');
        adForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(adForm);
            const res = await fetch(adForm.action, { method: 'POST', body: data, headers: { Accept: 'application/json' } });
            if (res.ok) {
                adForm.classList.add('hidden');
                document.getElementById('ad-success').classList.remove('hidden');
            }
        });
    </script>

    <script src="script.js"></script>
</body>

</html>
